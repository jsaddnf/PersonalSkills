<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 2580" width="720" height="2580" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <title>7 日青甘小环线 · 彩色版</title>

  <!-- ============ HEADER (dark) ============ -->
  <rect width="720" height="180" fill="#1a1a1a"/>
  <text x="40" y="56" fill="#fefcf6" font-size="30" font-weight="700">7 日青甘小环线</text>
  <text x="40" y="82" fill="#9a8d75" font-size="12">国庆 7 天自驾 · G6 + G109 + G315</text>
  <text x="680" y="50" text-anchor="end" fill="#d97a3a" font-size="22" font-weight="700">1,750 km</text>
  <text x="680" y="80" text-anchor="end" fill="#d97a3a" font-size="18" font-weight="700">▲ 3,820 m</text>

  <!-- Route flow strip -->
  <rect x="0" y="118" width="720" height="50" fill="#252321"/>
  <text x="40" y="148" fill="#9a8d75" font-size="13">西宁 → 共和 → 茶卡 → 德令哈 → 大柴旦 → 敦煌 → 西宁</text>

  <!-- ============ MAP (sand beige) ============ -->
  <rect y="180" width="720" height="380" fill="#ead5b0"/>

  <!-- Compass -->
  <g transform="translate(50 220)">
    <circle r="14" fill="#fefcf6" stroke="#9a8d75" stroke-width="1"/>
    <path d="M 0,-9 L 3,1 L 0,9 L -3,1 Z" fill="#5a4a35"/>
    <text x="0" y="-19" text-anchor="middle" fill="#5a4a35" font-size="9" font-weight="700">N</text>
  </g>

  <!-- Driving route path -->
  <path d="M 610 460 Q 565 472 520 480 Q 475 472 430 460 Q 385 435 340 410 Q 250 405 130 400 Q 185 380 240 360 Q 205 315 170 270"
        fill="none" stroke="#3a2d1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Train return dashed -->
  <path d="M 175 285 Q 400 380 610 460"
        fill="none" stroke="#5a4a35" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.55"/>
  <text x="395" y="380" text-anchor="middle" fill="#5a4a35" font-size="10" font-style="italic" transform="rotate(22 395 380)">— 火车返程 —</text>

  <!-- Distance labels -->
  <g fill="#5a4a35" font-size="10" font-style="italic" font-weight="600">
    <text x="565" y="486" text-anchor="middle">280</text>
    <text x="475" y="486" text-anchor="middle">170</text>
    <text x="385" y="436" text-anchor="middle">190</text>
    <text x="240" y="395" text-anchor="middle">410</text>
    <text x="183" y="372" text-anchor="middle">120</text>
    <text x="225" y="318" text-anchor="middle">360</text>
  </g>

  <!-- ===== Stops with day colors ===== -->
  <!-- 敦煌 (D5/D6) olive -->
  <circle cx="170" cy="270" r="11" fill="#5a7a3a" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="170" y="275" text-anchor="middle" fill="#fefcf6" font-size="10" font-weight="700">5·6</text>
  <text x="170" y="246" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="700">敦煌</text>
  <text x="170" y="260" text-anchor="middle" fill="#5a4a35" font-size="9">1,139 m</text>

  <!-- 大柴旦 (D4) teal -->
  <circle cx="240" cy="360" r="10" fill="#3d8b85" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="240" y="364" text-anchor="middle" fill="#fefcf6" font-size="10" font-weight="700">4</text>
  <text x="245" y="345" fill="#1a1a1a" font-size="13" font-weight="700">大柴旦</text>
  <text x="245" y="358" fill="#5a4a35" font-size="9">3,170 m</text>

  <!-- 水上雅丹 (D4 waypoint) -->
  <circle cx="130" cy="400" r="6" fill="#fefcf6" stroke="#3d8b85" stroke-width="2"/>
  <text x="120" y="404" text-anchor="end" fill="#1a1a1a" font-size="11" font-weight="600">水上雅丹</text>

  <!-- 德令哈 (D3 end) red -->
  <circle cx="340" cy="410" r="10" fill="#c44d3e" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="340" y="414" text-anchor="middle" fill="#fefcf6" font-size="10" font-weight="700">3</text>
  <text x="340" y="395" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="700">德令哈</text>
  <text x="340" y="383" text-anchor="middle" fill="#5a4a35" font-size="9">2,981 m</text>

  <!-- 茶卡 (D3 waypoint) -->
  <circle cx="430" cy="460" r="9" fill="#c44d3e" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="430" y="445" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="700">茶卡</text>
  <text x="430" y="431" text-anchor="middle" fill="#5a4a35" font-size="9">3,059 m</text>

  <!-- 共和 (D2 end) yellow -->
  <circle cx="520" cy="480" r="10" fill="#e6a13a" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="520" y="484" text-anchor="middle" fill="#fefcf6" font-size="10" font-weight="700">2</text>
  <text x="520" y="503" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="700">共和</text>
  <text x="520" y="517" text-anchor="middle" fill="#5a4a35" font-size="9">2,835 m</text>

  <!-- 西宁 (D1/D7) blue -->
  <circle cx="610" cy="460" r="11" fill="#5b8cb5" stroke="#fefcf6" stroke-width="2.5"/>
  <text x="610" y="465" text-anchor="middle" fill="#fefcf6" font-size="10" font-weight="700">1·7</text>
  <text x="610" y="445" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="700">西宁</text>
  <text x="610" y="431" text-anchor="middle" fill="#5a4a35" font-size="9">2,261 m</text>

  <!-- 青海湖 (subtle hint between 共和 and 茶卡) -->
  <ellipse cx="475" cy="470" rx="34" ry="8" fill="#7fa8c4" opacity="0.25"/>

  <!-- Map title corner -->
  <text x="680" y="220" text-anchor="end" fill="#5a4a35" font-size="10" font-weight="700" letter-spacing="2">ROUTE MAP</text>

  <!-- ============ DAY CARDS ============ -->

  <!-- ===== D1 钴蓝 ===== -->
  <g transform="translate(60 600)">
    <rect width="600" height="232" rx="10" fill="#5b8cb5"/>
    <!-- Watermark big number -->
    <text x="570" y="195" text-anchor="end" fill="#4a7aa0" font-size="160" font-weight="800" opacity="0.55">1</text>
    <!-- D# badge -->
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D1</text>
    <!-- Date -->
    <text x="60" y="40" fill="#dde8f1" font-size="12">10月1日 · 周四</text>
    <!-- Title -->
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">西宁集合</text>
    <!-- Pills -->
    <g transform="translate(24 96)">
      <rect width="84" height="24" rx="12" fill="#4a7aa0"/>
      <text x="42" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 0 km</text>
      <rect x="92" width="100" height="24" rx="12" fill="#4a7aa0"/>
      <text x="142" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⛰ 2,261 m</text>
    </g>
    <!-- Bullets -->
    <text x="24" y="148" fill="#fefcf6" font-size="13">🕌  东关清真大寺</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">🏛️  马步芳公馆</text>
    <text x="24" y="192" fill="#fefcf6" font-size="13">🍜  力盏街晚餐</text>
    <!-- Footer -->
    <text x="24" y="218" fill="#dde8f1" font-size="11">跳过塔尔寺（国庆爆堵）· 出发前满油</text>
  </g>

  <!-- ===== D2 金黄 ===== -->
  <g transform="translate(60 850)">
    <rect width="600" height="232" rx="10" fill="#e6a13a"/>
    <text x="570" y="195" text-anchor="end" fill="#c88a25" font-size="160" font-weight="800" opacity="0.55">2</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D2</text>
    <text x="60" y="40" fill="#fef0d8" font-size="12">10月2日 · 周五</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">西宁 → 共和</text>
    <g transform="translate(24 96)">
      <rect width="92" height="24" rx="12" fill="#c88a25"/>
      <text x="46" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 280 km</text>
      <rect x="100" width="104" height="24" rx="12" fill="#c88a25"/>
      <text x="152" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">▲ 3,820 m</text>
      <rect x="212" width="76" height="24" rx="12" fill="#c88a25"/>
      <text x="250" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⏱ 5-6 h</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">⛰️  拉脊山垭口（3820m）</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">🌾  倒淌河</text>
    <text x="24" y="192" fill="#fefcf6" font-size="13">🏞️  青海湖南岸 G109</text>
    <text x="24" y="218" fill="#fef0d8" font-size="11">二郎剑国庆排队 2h，建议路过</text>
  </g>

  <!-- ===== D3 砖红 ===== -->
  <g transform="translate(60 1100)">
    <rect width="600" height="252" rx="10" fill="#c44d3e"/>
    <text x="570" y="200" text-anchor="end" fill="#a83a2c" font-size="160" font-weight="800" opacity="0.55">3</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D3</text>
    <text x="60" y="40" fill="#f7d7d2" font-size="12">10月3日 · 周六</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">共和 → 茶卡 → 德令哈</text>
    <g transform="translate(24 96)">
      <rect width="92" height="24" rx="12" fill="#a83a2c"/>
      <text x="46" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 330 km</text>
      <rect x="100" width="104" height="24" rx="12" fill="#a83a2c"/>
      <text x="152" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">▲ 3,793 m</text>
      <rect x="212" width="68" height="24" rx="12" fill="#a83a2c"/>
      <text x="246" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⏱ 5 h</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">🧂  茶卡盐湖（早起赶第一波）</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">⛰️  橡皮山垭口（3793m）</text>
    <text x="24" y="192" fill="#fefcf6" font-size="13">🌅  可鲁克 - 托素湖日落</text>
    <text x="24" y="214" fill="#fefcf6" font-size="13">🛸  外星人遗址</text>
    <text x="24" y="240" fill="#f7d7d2" font-size="11">茶卡门票小程序提前买</text>
  </g>

  <!-- ===== D4 青绿 ===== -->
  <g transform="translate(60 1370)">
    <rect width="600" height="232" rx="10" fill="#3d8b85"/>
    <text x="570" y="195" text-anchor="end" fill="#2d716c" font-size="160" font-weight="800" opacity="0.55">4</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D4</text>
    <text x="60" y="40" fill="#c5e1de" font-size="12">10月4日 · 周日</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">德令哈 → 大柴旦</text>
    <g transform="translate(24 96)">
      <rect width="92" height="24" rx="12" fill="#2d716c"/>
      <text x="46" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 410 km</text>
      <rect x="100" width="104" height="24" rx="12" fill="#2d716c"/>
      <text x="152" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">▲ 3,500 m</text>
      <rect x="212" width="76" height="24" rx="12" fill="#2d716c"/>
      <text x="250" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⏱ 6-7 h</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">🛣️  G315 U 型公路</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">💎  东台吉乃尔湖</text>
    <text x="24" y="192" fill="#fefcf6" font-size="13">🏝️  水上雅丹（日落最佳）</text>
    <text x="24" y="218" fill="#c5e1de" font-size="11">全程最长一日 · 离开德令哈务必满油</text>
  </g>

  <!-- ===== D5 橄榄 ===== -->
  <g transform="translate(60 1620)">
    <rect width="600" height="252" rx="10" fill="#5a7a3a"/>
    <text x="570" y="200" text-anchor="end" fill="#4a6628" font-size="160" font-weight="800" opacity="0.55">5</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D5</text>
    <text x="60" y="40" fill="#d2dec0" font-size="12">10月5日 · 周一</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">大柴旦 → 敦煌</text>
    <g transform="translate(24 96)">
      <rect width="92" height="24" rx="12" fill="#4a6628"/>
      <text x="46" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 360 km</text>
      <rect x="100" width="104" height="24" rx="12" fill="#4a6628"/>
      <text x="152" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">▲ 3,800 m</text>
      <rect x="212" width="68" height="24" rx="12" fill="#4a6628"/>
      <text x="246" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⏱ 5 h</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">💎  大柴旦翡翠湖（晨拍）</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">⛰️  当金山口（3800m）</text>
    <text x="24" y="192" fill="#fefcf6" font-size="13">🏚️  阿克塞老县城</text>
    <text x="24" y="214" fill="#fefcf6" font-size="13">🍜  沙州夜市</text>
    <text x="24" y="240" fill="#d2dec0" font-size="11">阿克塞废墟出片，停 30min</text>
  </g>

  <!-- ===== D6 葡萄紫 ===== -->
  <g transform="translate(60 1890)">
    <rect width="600" height="212" rx="10" fill="#6b4f7a"/>
    <text x="570" y="180" text-anchor="end" fill="#563d62" font-size="160" font-weight="800" opacity="0.55">6</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D6</text>
    <text x="60" y="40" fill="#d8c8de" font-size="12">10月6日 · 周二</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">敦煌一日</text>
    <g transform="translate(24 96)">
      <rect width="100" height="24" rx="12" fill="#563d62"/>
      <text x="50" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">📍 ~80 km</text>
      <rect x="108" width="104" height="24" rx="12" fill="#563d62"/>
      <text x="160" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">⛰ 1,139 m</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">🏛️  莫高窟</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">🐪  鸣沙山月牙泉</text>
    <text x="24" y="198" fill="#d8c8de" font-size="11">备选：阳关 / 玉门关 / 雅丹魔鬼城</text>
  </g>

  <!-- ===== D7 落日橙 ===== -->
  <g transform="translate(60 2120)">
    <rect width="600" height="212" rx="10" fill="#d97a3a"/>
    <text x="570" y="180" text-anchor="end" fill="#b86028" font-size="160" font-weight="800" opacity="0.55">7</text>
    <text x="24" y="40" fill="#fefcf6" font-size="16" font-weight="700" letter-spacing="1">D7</text>
    <text x="60" y="40" fill="#f7dcc4" font-size="12">10月7日 · 周三</text>
    <text x="24" y="78" fill="#fefcf6" font-size="22" font-weight="700">敦煌 → 西宁</text>
    <g transform="translate(24 96)">
      <rect width="92" height="24" rx="12" fill="#b86028"/>
      <text x="46" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">🚆 5-6 h</text>
      <rect x="100" width="84" height="24" rx="12" fill="#b86028"/>
      <text x="142" y="16" text-anchor="middle" fill="#fefcf6" font-size="11" font-weight="600">D / Z 直达</text>
    </g>
    <text x="24" y="148" fill="#fefcf6" font-size="13">🚗  上午敦煌还车</text>
    <text x="24" y="170" fill="#fefcf6" font-size="13">🚆  敦煌站 D / Z 直达西宁</text>
    <text x="24" y="198" fill="#f7dcc4" font-size="11">西宁继续各自飞回</text>
  </g>

  <!-- ============ TIPS SECTION ============ -->
  <g transform="translate(60 2360)">
    <rect width="600" height="180" rx="10" fill="#fefcf6" stroke="#e8e0cf" stroke-width="1"/>
    <text x="24" y="34" fill="#1a1a1a" font-size="16" font-weight="700">出行提示</text>
    <line x1="24" y1="48" x2="576" y2="48" stroke="#e8e0cf"/>

    <!-- Col 1: 证件 -->
    <g transform="translate(24 70)">
      <text x="0" y="0" fill="#5b8cb5" font-size="12" font-weight="700">📋  证件</text>
      <text x="0" y="22" fill="#3c3530" font-size="11">入藏不需要 / 身份证驾照</text>
      <text x="0" y="40" fill="#3c3530" font-size="11">租车合同备注可走 G6/G109</text>
    </g>

    <!-- Col 2: 燃油 -->
    <g transform="translate(304 70)">
      <text x="0" y="0" fill="#3d8b85" font-size="12" font-weight="700">⛽  燃油</text>
      <text x="0" y="22" fill="#3c3530" font-size="11">离开德令哈务必满油</text>
      <text x="0" y="40" fill="#3c3530" font-size="11">大柴旦后加油站间隔大</text>
    </g>

    <!-- Col 3: 高原 -->
    <g transform="translate(24 132)">
      <text x="0" y="0" fill="#c44d3e" font-size="12" font-weight="700">🏔️  高原</text>
      <text x="0" y="22" fill="#3c3530" font-size="11">红景天提前 7 天服 · 备高反药</text>
    </g>

    <!-- Col 4: 抢票 -->
    <g transform="translate(304 132)">
      <text x="0" y="0" fill="#d97a3a" font-size="12" font-weight="700">🎫  抢票</text>
      <text x="0" y="22" fill="#3c3530" font-size="11">9/6 周日 8:00 抢莫高窟</text>
    </g>
  </g>

  <text x="660" y="2570" text-anchor="end" fill="#9a8d75" font-size="10" letter-spacing="1">青甘小环线 · 彩色版</text>
</svg>
